name: ADE Catalog Dump

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit result to data/ade_catalog.json"
        type: boolean
        default: true

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics
        run: |
          curl --version | head -1
          getent hosts apis.stats.govt.nz || true
          echo "key_len=${#ADE_API_KEY}"
        env:
          ADE_API_KEY: ${{ secrets.ADE_API_KEY }}

      - name: Fetch ADE dataflow catalog
        env:
          ADE_API_KEY: ${{ secrets.ADE_API_KEY }}
        run: |
          set -uo pipefail
          # Strip any whitespace / CR / LF from the secret (common paste hazard).
          KEY="$(printf '%s' "${ADE_API_KEY}" | tr -d ' \t\r\n')"
          if [ -z "${KEY}" ]; then
            echo "::error::ADE_API_KEY is empty after trim"
            exit 1
          fi
          echo "trimmed key_len=${#KEY}"
          mkdir -p data
          URL="https://apis.stats.govt.nz/ade-api/rest/dataflow/all/all/latest?references=none&detail=allstubs"
          # Attempt 1: SDMX-JSON accept header
          HTTP=$(curl -sS -o data/ade_catalog.raw.json -w '%{http_code}' \
                 -H "Ocp-Apim-Subscription-Key: ${KEY}" \
                 -H "Accept: application/vnd.sdmx.structure+xml;version=2.1" \
                 "$URL") || { echo "::error::curl attempt-1 exited $?"; }
          echo "attempt-1 HTTP=${HTTP:-none}  bytes=$(wc -c < data/ade_catalog.raw.json 2>/dev/null || echo 0)"
          if [ "${HTTP:-000}" != "200" ]; then
            echo "---attempt-1 body head---"
            head -c 400 data/ade_catalog.raw.json || true; echo
            # Attempt 2: plain application/json
            HTTP=$(curl -sS -o data/ade_catalog.raw.json -w '%{http_code}' \
                   -H "Ocp-Apim-Subscription-Key: ${KEY}" \
                   -H "Accept: application/vnd.sdmx.structure+xml;version=2.0" \
                   "$URL") || { echo "::error::curl attempt-2 exited $?"; exit 1; }
            echo "attempt-2 HTTP=${HTTP}  bytes=$(wc -c < data/ade_catalog.raw.json)"
          fi
          if [ "${HTTP}" != "200" ]; then
            echo "---final body head---"; head -c 800 data/ade_catalog.raw.json; echo
            echo "::error::ADE catalog fetch failed with HTTP ${HTTP}"; exit 1
          fi
          # Normalise
          python3 scripts/normalise_ade_catalog.py data/ade_catalog.raw.json data/ade_catalog.json
          echo "Dataflow count: $(jq '.count' data/ade_catalog.json)"
          (jq -r '.dataflows[] | "\(.id)\t\(.name)"' data/ade_catalog.json | head -30) || true

      - name: Upload catalog as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ade-catalog
          path: |
            data/ade_catalog.json
            data/ade_catalog.raw.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit catalog to repo
        if: ${{ inputs.commit && success() }}
        run: |
          git config user.name  "observatory-bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          rm -f data/ade_catalog.raw.json
          git add data/ade_catalog.json
          if git diff --cached --quiet; then
            echo "No catalog change."
          else
            git commit -m "chore(catalog): refresh ADE dataflow catalog"
            git push
          fi
