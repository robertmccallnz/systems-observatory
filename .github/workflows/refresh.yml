name: Refresh indicators
on:
  schedule:
    # Daily at 20:00 UTC = 08:00 NZST
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch live indicators
        env:
          ADE_API_KEY: ${{ secrets.ADE_API_KEY }}
        run: python scripts/fetch_indicators.py
      - name: Generate reports (CSV + monthly Markdown)
        run: python scripts/generate_reports.py
      - name: Generate per-LP sparkline SVGs
        run: python scripts/generate_sparklines.py
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Render monthly PDF report
        run: |
          MD=$(ls -1 reports/state-of-the-system-*.md | tail -1)
          if [ -n "$MD" ]; then
            PDF="${MD%.md}.pdf"
            pandoc "$MD" -o "$PDF" --pdf-engine=weasyprint || pandoc "$MD" -o "$PDF" || echo "pandoc render failed - continuing"
          fi
      - name: Commit refreshed data
        run: |
          git config user.name "te-pa-observatory-bot"
          git config user.email "bot@te-pa.org"
          git add data/indicators.json reports/ assets/social/
          git diff --cached --quiet || git commit -m "chore: refresh indicators $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
